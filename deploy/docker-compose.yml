version: "3.8"

services:
  api-core:
    image: bankda-api-core:latest
    build:
      context: ..
      dockerfile: deploy/docker/api-core/Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - /home/prdmng/bankda/logs/api-core:/data/logs/api-core
    restart: unless-stopped

  mcp-core:
    image: bankda-mcp-core:latest
    build:
      context: ..
      dockerfile: deploy/docker/mcp-core/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - BACKEND_API_URL=http://api-core:8002
    depends_on:
      - api-core
    volumes:
      - /home/prdmng/bankda/logs/mcp-core:/data/logs/mcp-core
    restart: unless-stopped

  agent-core:
    image: bankda-agent-core:latest
    build:
      context: ..
      dockerfile: deploy/docker/agent-core/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - /home/prdmng/bankda/logs/agent-core:/data/logs/agent-core
    restart: unless-stopped
