version: "3.8"

services:
  agentda:
    image: agentda:latest
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - /home/prdmng/agentda/logs:/data/logs
    environment:
      - API_CORE_URL=http://localhost:8002
      - TZ=Asia/Shanghai
    restart: unless-stopped
